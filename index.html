<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>LUMINA — 3D Art Gallery</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #080808;
    --surface: #111111;
    --border: rgba(255,255,255,0.08);
    --gold: #c9a84c;
    --gold-light: #e8c97a;
    --white: #f0ece4;
    --muted: rgba(240,236,228,0.45);
    --accent: #ff4d2e;
    --font-display: 'Bebas Neue', sans-serif;
    --font-serif: 'Cormorant Garamond', serif;
    --font-mono: 'Space Mono', monospace;
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: var(--bg);
    color: var(--white);
    font-family: var(--font-serif);
    cursor: none;
  }

  /* Custom cursor */
  #cursor {
    position: fixed; z-index: 9999;
    pointer-events: none;
    width: 12px; height: 12px;
    border-radius: 50%;
    background: var(--gold);
    transform: translate(-50%, -50%);
    transition: transform 0.1s ease, background 0.2s;
    mix-blend-mode: difference;
  }
  #cursor-ring {
    position: fixed; z-index: 9998;
    pointer-events: none;
    width: 40px; height: 40px;
    border-radius: 50%;
    border: 1px solid var(--gold);
    transform: translate(-50%, -50%);
    transition: transform 0.15s ease, width 0.3s ease, height 0.3s ease, opacity 0.3s ease;
    opacity: 0.6;
  }

  /* Canvas */
  #canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100vw; height: 100vh;
  }

  /* UI Overlay */
  #ui {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 100;
  }

  /* Header */
  #header {
    position: absolute;
    top: 0; left: 0; right: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 28px 48px;
    pointer-events: all;
  }
  #logo {
    font-family: var(--font-display);
    font-size: 2.4rem;
    letter-spacing: 0.18em;
    color: var(--gold);
    text-shadow: 0 0 40px rgba(201,168,76,0.4);
    cursor: none;
  }
  #logo span {
    color: var(--white);
    opacity: 0.5;
    font-size: 0.9rem;
    font-family: var(--font-mono);
    letter-spacing: 0.08em;
    vertical-align: middle;
    margin-left: 12px;
  }
  #nav {
    display: flex; gap: 32px;
    font-family: var(--font-mono);
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    color: var(--muted);
  }
  #nav button {
    background: none; border: none; color: inherit;
    cursor: none; font: inherit; letter-spacing: inherit;
    transition: color 0.2s;
    text-transform: uppercase;
  }
  #nav button:hover, #nav button.active { color: var(--gold); }

  /* Controls hint */
  #controls-hint {
    position: absolute;
    bottom: 32px; left: 48px;
    font-family: var(--font-mono);
    font-size: 0.62rem;
    letter-spacing: 0.12em;
    color: var(--muted);
    line-height: 1.9;
    opacity: 1;
    transition: opacity 0.5s;
  }
  #controls-hint.hidden { opacity: 0; }
  #controls-hint .key {
    display: inline-block;
    border: 1px solid rgba(255,255,255,0.2);
    padding: 1px 6px;
    border-radius: 3px;
    margin-right: 6px;
    font-size: 0.6rem;
    color: var(--gold-light);
  }

  /* Room indicator */
  #room-indicator {
    position: absolute;
    bottom: 32px; right: 48px;
    text-align: right;
    font-family: var(--font-mono);
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 0.1em;
  }
  #room-indicator .room-num {
    font-size: 2.5rem;
    font-family: var(--font-display);
    color: var(--gold);
    line-height: 1;
    display: block;
    text-shadow: 0 0 30px rgba(201,168,76,0.3);
  }

  /* Artwork detail panel */
  #artwork-panel {
    position: absolute;
    right: 0; top: 0; bottom: 0;
    width: 360px;
    background: linear-gradient(135deg, rgba(8,8,8,0.97), rgba(16,12,8,0.97));
    border-left: 1px solid var(--border);
    padding: 120px 40px 60px;
    transform: translateX(100%);
    transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    pointer-events: all;
    backdrop-filter: blur(20px);
    overflow-y: auto;
  }
  #artwork-panel.open { transform: translateX(0); }
  #artwork-panel::before {
    content: '';
    position: absolute;
    top: 80px; left: 40px; right: 40px;
    height: 1px;
    background: linear-gradient(90deg, var(--gold), transparent);
    opacity: 0.4;
  }
  #panel-close {
    position: absolute;
    top: 32px; right: 32px;
    background: none; border: none;
    color: var(--muted); cursor: none;
    font-family: var(--font-mono); font-size: 0.7rem;
    letter-spacing: 0.1em;
    transition: color 0.2s;
    padding: 8px;
  }
  #panel-close:hover { color: var(--gold); }
  #panel-num {
    font-family: var(--font-display);
    font-size: 5rem;
    color: rgba(201,168,76,0.12);
    line-height: 1;
    margin-bottom: -20px;
  }
  #panel-title {
    font-family: var(--font-serif);
    font-style: italic;
    font-size: 1.9rem;
    font-weight: 300;
    line-height: 1.2;
    color: var(--white);
    margin-bottom: 6px;
  }
  #panel-artist {
    font-family: var(--font-mono);
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 28px;
  }
  #panel-year {
    font-family: var(--font-mono);
    font-size: 0.6rem;
    color: var(--muted);
    letter-spacing: 0.1em;
    margin-bottom: 24px;
  }
  #panel-divider {
    width: 32px; height: 1px;
    background: var(--gold);
    margin-bottom: 24px;
    opacity: 0.6;
  }
  #panel-desc {
    font-family: var(--font-serif);
    font-size: 1rem;
    font-weight: 300;
    line-height: 1.9;
    color: rgba(240,236,228,0.75);
    margin-bottom: 36px;
  }
  #panel-medium {
    font-family: var(--font-mono);
    font-size: 0.6rem;
    color: var(--muted);
    letter-spacing: 0.1em;
    border-top: 1px solid var(--border);
    padding-top: 20px;
    line-height: 2;
  }
  #panel-medium span { color: var(--white); }
  .panel-tag {
    display: inline-block;
    border: 1px solid rgba(201,168,76,0.3);
    color: var(--gold);
    padding: 3px 10px;
    font-family: var(--font-mono);
    font-size: 0.58rem;
    letter-spacing: 0.1em;
    border-radius: 2px;
    margin: 4px 4px 0 0;
    text-transform: uppercase;
  }
  #panel-tags { margin-top: 16px; }

  /* Minimap */
  #minimap {
    position: absolute;
    top: 50%; right: 48px;
    transform: translateY(-50%);
    display: flex;
    flex-direction: column;
    gap: 8px;
    pointer-events: all;
  }
  .minimap-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: rgba(255,255,255,0.15);
    cursor: none;
    transition: all 0.3s;
    position: relative;
  }
  .minimap-dot.active {
    background: var(--gold);
    box-shadow: 0 0 12px rgba(201,168,76,0.6);
    width: 8px; height: 8px;
  }
  .minimap-dot::after {
    content: attr(data-label);
    position: absolute;
    right: 16px; top: 50%;
    transform: translateY(-50%);
    font-family: var(--font-mono);
    font-size: 0.55rem;
    color: var(--muted);
    white-space: nowrap;
    opacity: 0;
    transition: opacity 0.2s;
    letter-spacing: 0.08em;
  }
  .minimap-dot:hover::after, .minimap-dot.active::after { opacity: 1; }

  /* Loading screen */
  #loading {
    position: fixed;
    inset: 0; z-index: 9000;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 32px;
    transition: opacity 0.8s ease, visibility 0.8s;
  }
  #loading.done { opacity: 0; visibility: hidden; }
  #loading-logo {
    font-family: var(--font-display);
    font-size: 5rem;
    letter-spacing: 0.3em;
    color: var(--gold);
    text-shadow: 0 0 60px rgba(201,168,76,0.5);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 0.8; }
    50% { opacity: 1; text-shadow: 0 0 80px rgba(201,168,76,0.8); }
  }
  #loading-bar-wrap {
    width: 200px; height: 1px;
    background: rgba(255,255,255,0.1);
    position: relative;
    overflow: hidden;
  }
  #loading-bar {
    position: absolute; left: 0; top: 0;
    height: 100%;
    background: linear-gradient(90deg, var(--gold), var(--gold-light));
    width: 0%;
    transition: width 0.3s ease;
    box-shadow: 0 0 10px rgba(201,168,76,0.6);
  }
  #loading-text {
    font-family: var(--font-mono);
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    color: var(--muted);
    text-transform: uppercase;
  }

  /* Tooltip on hover */
  #tooltip {
    position: fixed;
    pointer-events: none;
    z-index: 200;
    font-family: var(--font-serif);
    font-style: italic;
    font-size: 0.95rem;
    color: var(--gold-light);
    background: rgba(8,8,8,0.85);
    border: 1px solid rgba(201,168,76,0.2);
    padding: 8px 16px;
    backdrop-filter: blur(8px);
    opacity: 0;
    transition: opacity 0.2s;
    white-space: nowrap;
    transform: translate(18px, -50%);
    border-radius: 2px;
  }
  #tooltip.visible { opacity: 1; }

  /* Ambient corner deco */
  .corner-deco {
    position: fixed;
    width: 60px; height: 60px;
    pointer-events: none;
    z-index: 50;
    opacity: 0.25;
  }
  .corner-deco svg { width: 100%; height: 100%; }
  .corner-tl { top: 16px; left: 16px; }
  .corner-br { bottom: 16px; right: 16px; transform: rotate(180deg); }

  /* Floor counter line */
  #progress-line {
    position: fixed;
    top: 0; left: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--gold), var(--gold-light), transparent);
    width: 0%;
    transition: width 0.4s ease;
    z-index: 300;
    box-shadow: 0 0 8px rgba(201,168,76,0.5);
  }

  @media (max-width: 768px) {
    #artwork-panel { width: 100%; border-left: none; border-top: 1px solid var(--border); top: auto; height: 55vh; padding: 60px 28px 40px; }
    #header { padding: 20px 24px; }
    #logo { font-size: 1.8rem; }
    #nav { display: none; }
    #controls-hint { left: 24px; bottom: 80px; font-size: 0.55rem; }
    #room-indicator { right: 24px; bottom: 80px; }
    #minimap { display: none; }
  }
</style>
</head>
<body>

<!-- Loading -->
<div id="loading">
  <div id="loading-logo">LUMINA</div>
  <div id="loading-bar-wrap"><div id="loading-bar"></div></div>
  <div id="loading-text">Preparing the gallery…</div>
</div>

<!-- Custom cursors -->
<div id="cursor"></div>
<div id="cursor-ring"></div>

<!-- Progress line -->
<div id="progress-line"></div>

<!-- Canvas -->
<canvas id="canvas"></canvas>

<!-- Corner decorations -->
<div class="corner-deco corner-tl">
  <svg viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M0 60 L0 0 L60 0" stroke="#c9a84c" stroke-width="1"/>
    <path d="M0 40 L20 40 L20 0" stroke="#c9a84c" stroke-width="0.5" opacity="0.5"/>
    <circle cx="0" cy="0" r="3" fill="#c9a84c"/>
  </svg>
</div>
<div class="corner-deco corner-br">
  <svg viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M0 60 L0 0 L60 0" stroke="#c9a84c" stroke-width="1"/>
    <path d="M0 40 L20 40 L20 0" stroke="#c9a84c" stroke-width="0.5" opacity="0.5"/>
    <circle cx="0" cy="0" r="3" fill="#c9a84c"/>
  </svg>
</div>

<!-- Tooltip -->
<div id="tooltip"></div>

<!-- UI Overlay -->
<div id="ui">
  <div id="header">
    <div id="logo">LUMINA <span>GALLERY — 2025</span></div>
    <nav id="nav">
      <button onclick="resetView()">Overview</button>
      <button id="btn-auto" onclick="toggleAuto()">Auto Tour</button>
      <button onclick="toggleHelp()">Controls</button>
    </nav>
  </div>

  <!-- Artwork panel -->
  <div id="artwork-panel">
    <button id="panel-close" onclick="closePanel()">[ CLOSE ]</button>
    <div id="panel-num">01</div>
    <div id="panel-title">Untitled</div>
    <div id="panel-artist">Artist Name</div>
    <div id="panel-year">2025 · Acrylic on canvas · 120×90cm</div>
    <div id="panel-divider"></div>
    <div id="panel-desc">Description here.</div>
    <div id="panel-medium">
      MEDIUM: <span id="panel-med-val">—</span><br/>
      DIMENSIONS: <span id="panel-dim-val">—</span>
    </div>
    <div id="panel-tags"></div>
  </div>

  <!-- Controls hint -->
  <div id="controls-hint">
    <div><span class="key">DRAG</span> Orbit camera</div>
    <div><span class="key">SCROLL</span> Zoom</div>
    <div><span class="key">CLICK</span> Select artwork</div>
    <div><span class="key">WASD</span> Walk through</div>
  </div>

  <!-- Room indicator -->
  <div id="room-indicator">
    <span class="room-num" id="room-num">—</span>
    <span id="room-name">THE GALLERY</span>
  </div>

  <!-- Minimap -->
  <div id="minimap"></div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.module.js"
  }
}
</script>

<script type="module">
import * as THREE from 'three';

/* ─────────────────────────────────────────
   ARTWORK DATA
───────────────────────────────────────── */
const ARTWORKS = [
  {
    id: 1, title: "Chromatic Dissolution", artist: "Zara Voss",
    year: 2024, medium: "Generative digital print", dimensions: "150×100cm",
    desc: "An exploration of color theory at its limits — pigment dissolves into fields of pure luminance, challenging the eye to distinguish form from formlessness. The work emerged from 3,000 iterations of an algorithmic process trained on Turner's late works.",
    tags: ["Abstract", "Digital", "Color Theory"],
    color1: 0xff6b35, color2: 0xf7c59f, glow: 0xff8c57, type: "gradient"
  },
  {
    id: 2, title: "The Weight of Nothing", artist: "Marcus Lei",
    year: 2023, medium: "Oil on linen, gold leaf", dimensions: "200×180cm",
    desc: "Negative space becomes the protagonist. Five thousand hours of contemplation compressed into a canvas that holds more in its silences than in its marks. The gold leaf traces the invisible architecture of thought.",
    tags: ["Figurative", "Gold Leaf", "Meditative"],
    color1: 0x1a1a2e, color2: 0xc9a84c, glow: 0xe8c97a, type: "dark_gold"
  },
  {
    id: 3, title: "Tidal Recursion III", artist: "Noa Elmaz",
    year: 2024, medium: "Resin, embedded LED matrix", dimensions: "90×90×8cm",
    desc: "Ocean data from 40 years of satellite measurement translated into topological sculpture. The embedded LEDs pulse in real-time to wave frequency data from the Pacific. Each viewer sees a different moment of geological time.",
    tags: ["Sculpture", "Data Art", "Interactive"],
    color1: 0x0077b6, color2: 0x90e0ef, glow: 0x48cae4, type: "ocean"
  },
  {
    id: 4, title: "Scar Cartography", artist: "Ines Dubois",
    year: 2022, medium: "Etching, hand-stitched thread", dimensions: "70×100cm",
    desc: "Mapping the body's memory. Medical imaging data from healed fractures becomes landscape — a private topography made public. Thread traces the fault lines of recovery with obsessive precision across 40 copper plates.",
    tags: ["Mixed Media", "Autobiographical", "Textile"],
    color1: 0xf5f0e8, color2: 0xc4b49a, glow: 0xd4c5a9, type: "pale"
  },
  {
    id: 5, title: "Hyperstition Engine", artist: "Yuki Tanaka",
    year: 2025, medium: "3-channel video installation", dimensions: "Variable",
    desc: "Three screens present simultaneous futures, each diverging from a single present moment. The work draws on acceleration theory and chaos mathematics to model how belief systems generate the realities they predict.",
    tags: ["Video Art", "Theory", "Installation"],
    color1: 0x7b2d8b, color2: 0xe040fb, glow: 0xce93d8, type: "violet"
  },
  {
    id: 6, title: "After the Anthropocene", artist: "Rael Veen",
    year: 2024, medium: "Reclaimed industrial material, rust patina", dimensions: "180×60×40cm",
    desc: "Steel salvaged from decommissioned oil infrastructure is reborn as monument. The artist spent six months treating surfaces with controlled oxidation processes, creating gradients of rust that document geological time in compressed form.",
    tags: ["Sculpture", "Ecological", "Industrial"],
    color1: 0x8b4513, color2: 0xd2691e, glow: 0xcd853f, type: "rust"
  },
  {
    id: 7, title: "Mirror Fugue №7", artist: "Asha Mehta",
    year: 2023, medium: "Polished stainless steel, sound", dimensions: "120×120×5cm",
    desc: "Reflective panels arranged according to Bach's Crab Canon create impossible geometries. A custom audio system plays the fugue while the visual warps and multiplies the gallery space — dissolving the boundary between room and image.",
    tags: ["Reflective", "Sound Art", "Geometry"],
    color1: 0xcccccc, color2: 0xffffff, glow: 0xe8e8e8, type: "mirror"
  },
  {
    id: 8, title: "Bioluminescent Study IV", artist: "Cleo Harms",
    year: 2025, medium: "Phosphorescent ink, UV light, paper", dimensions: "60×80cm",
    desc: "Drawings made with pigments extracted from bioluminescent organisms, activated by ultraviolet. In darkness the work transforms utterly — forms invisible in daylight emerge, reversing figure and ground, revealing a second painting hidden within the first.",
    tags: ["Drawing", "Light", "Biology"],
    color1: 0x004d40, color2: 0x69ffcb, glow: 0x64ffda, type: "biolum"
  }
];

/* ─────────────────────────────────────────
   THREE.JS SETUP
───────────────────────────────────────── */
const canvas = document.getElementById('canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.9;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x060608);
scene.fog = new THREE.FogExp2(0x060608, 0.018);

const camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.1, 200);
camera.position.set(0, 1.65, 12);

/* ─────────────────────────────────────────
   LIGHTING
───────────────────────────────────────── */
// Ambient
const ambient = new THREE.AmbientLight(0xfff5e4, 0.15);
scene.add(ambient);

// Main ceiling spotlights
const spotPositions = [
  [-8, 8, -4], [8, 8, -4],
  [-8, 8, 4],  [8, 8, 4],
  [0, 8, 0],   [-16, 8, -4], [16, 8, -4],
  [-16, 8, 4], [16, 8, 4]
];
const spots = [];
spotPositions.forEach(([x, y, z]) => {
  const s = new THREE.SpotLight(0xfff8e7, 1.5, 25, Math.PI / 6, 0.5, 1.5);
  s.position.set(x, y, z);
  s.castShadow = true;
  s.shadow.mapSize.width = 512;
  s.shadow.mapSize.height = 512;
  scene.add(s);
  scene.add(s.target);
  s.target.position.set(x, 0, z);
  spots.push(s);
});

// Picture lights (warm)
const pictureLights = [];
function addPictureLight(x, y, z, tx, ty, tz, color = 0xffd080) {
  const pl = new THREE.SpotLight(color, 3, 8, Math.PI / 8, 0.3, 2);
  pl.position.set(x, y, z);
  pl.castShadow = false;
  scene.add(pl);
  scene.add(pl.target);
  pl.target.position.set(tx, ty, tz);
  pictureLights.push(pl);
}

/* ─────────────────────────────────────────
   GEOMETRY HELPERS
───────────────────────────────────────── */
function makeBox(w, h, d, color, roughness = 0.9, metalness = 0) {
  const g = new THREE.BoxGeometry(w, h, d);
  const m = new THREE.MeshStandardMaterial({ color, roughness, metalness });
  return new THREE.Mesh(g, m);
}

function makeFloor() {
  const g = new THREE.PlaneGeometry(80, 40, 60, 30);
  const pos = g.attributes.position;
  for (let i = 0; i < pos.count; i++) {
    pos.setZ(i, pos.getZ(i) + (Math.random() - 0.5) * 0.01);
  }
  g.computeVertexNormals();
  const m = new THREE.MeshStandardMaterial({
    color: 0x1a1612,
    roughness: 0.3,
    metalness: 0.1,
  });
  const mesh = new THREE.Mesh(g, m);
  mesh.rotation.x = -Math.PI / 2;
  mesh.receiveShadow = true;
  return mesh;
}

/* ─────────────────────────────────────────
   GALLERY ROOM
───────────────────────────────────────── */
function buildGallery() {
  const root = new THREE.Group();

  // Floor
  const floor = makeFloor();
  root.add(floor);

  // Ceiling
  const ceil = makeBox(80, 0.3, 40, 0x0d0d0d, 1);
  ceil.position.set(0, 9, 0);
  root.add(ceil);

  // Walls
  const wallMat = new THREE.MeshStandardMaterial({ color: 0x141210, roughness: 0.95 });

  // Back wall
  const backWall = new THREE.Mesh(new THREE.BoxGeometry(80, 9, 0.4), wallMat);
  backWall.position.set(0, 4.5, -18);
  backWall.receiveShadow = true;
  root.add(backWall);

  // Front wall (with gap for entry)
  const fw1 = new THREE.Mesh(new THREE.BoxGeometry(30, 9, 0.4), wallMat);
  fw1.position.set(-25, 4.5, 18); fw1.receiveShadow = true; root.add(fw1);
  const fw2 = new THREE.Mesh(new THREE.BoxGeometry(30, 9, 0.4), wallMat);
  fw2.position.set(25, 4.5, 18); fw2.receiveShadow = true; root.add(fw2);
  const fw3 = new THREE.Mesh(new THREE.BoxGeometry(20, 3.5, 0.4), wallMat);
  fw3.position.set(0, 6.75, 18); fw3.receiveShadow = true; root.add(fw3);

  // Left wall
  const lw = new THREE.Mesh(new THREE.BoxGeometry(0.4, 9, 36), wallMat);
  lw.position.set(-40, 4.5, 0); lw.receiveShadow = true; root.add(lw);

  // Right wall
  const rw = new THREE.Mesh(new THREE.BoxGeometry(0.4, 9, 36), wallMat);
  rw.position.set(40, 4.5, 0); rw.receiveShadow = true; root.add(rw);

  // Interior divider walls
  const dw1 = new THREE.Mesh(new THREE.BoxGeometry(0.35, 9, 14), wallMat);
  dw1.position.set(-14, 4.5, 3); root.add(dw1);
  const dw2 = new THREE.Mesh(new THREE.BoxGeometry(0.35, 9, 14), wallMat);
  dw2.position.set(14, 4.5, 3); root.add(dw2);

  // Baseboard molding
  const bMat = new THREE.MeshStandardMaterial({ color: 0x1f1c18, roughness: 0.7, metalness: 0.1 });
  [-40, 40, -18].forEach(xz => {
    const horiz = xz === -18;
    const bw = new THREE.Mesh(horiz ? new THREE.BoxGeometry(80, 0.15, 0.12) : new THREE.BoxGeometry(0.12, 0.15, 36), bMat);
    bw.position.set(horiz ? 0 : xz, 0.08, horiz ? xz : 0);
    root.add(bw);
  });

  // Ceiling coving
  addCeilingLightStrip(root);

  // Columns
  for (let x of [-28, -7, 7, 28]) {
    const col = makeBox(0.6, 9, 0.6, 0x141210, 0.85, 0.05);
    col.position.set(x, 4.5, 0);
    col.castShadow = true; col.receiveShadow = true;
    root.add(col);
    // Column base
    const base = makeBox(0.85, 0.15, 0.85, 0x1f1c18, 0.7, 0.1);
    base.position.set(x, 0.075, 0); root.add(base);
  }

  // Ceiling coffers
  for (let x = -36; x <= 36; x += 9) {
    for (let z = -15; z <= 15; z += 9) {
      const coffer = new THREE.Mesh(
        new THREE.BoxGeometry(7.5, 0.12, 7.5),
        new THREE.MeshStandardMaterial({ color: 0x0f0f0f, roughness: 1 })
      );
      coffer.position.set(x, 8.92, z);
      root.add(coffer);
    }
  }

  // Floor rug / carpet runner
  const rugG = new THREE.PlaneGeometry(3, 30);
  const rugM = new THREE.MeshStandardMaterial({ color: 0x1a0f0a, roughness: 1 });
  const rug = new THREE.Mesh(rugG, rugM);
  rug.rotation.x = -Math.PI / 2;
  rug.position.set(0, 0.005, -3);
  root.add(rug);

  scene.add(root);
}

function addCeilingLightStrip(root) {
  const stripMat = new THREE.MeshStandardMaterial({ color: 0xfff8e7, emissive: 0xfff0c0, emissiveIntensity: 0.5 });
  for (let z = -15; z <= 15; z += 9) {
    const strip = new THREE.Mesh(new THREE.BoxGeometry(74, 0.05, 0.15), stripMat);
    strip.position.set(0, 8.94, z); root.add(strip);
  }
  // Add dim strip lights
  for (let z = -15; z <= 15; z += 9) {
    const sl = new THREE.RectAreaLight(0xfff0c0, 0.6, 74, 0.15);
    sl.position.set(0, 8.9, z);
    sl.lookAt(0, 0, z);
    scene.add(sl);
  }
}

const artworkMeshes = [];
const FRAME_COLOR = 0x1a1510;
const FRAME_METAL = 0.3;

// Artwork positions: [x, y, z, rotY, scaleW, scaleH]
const ARTWORK_POSITIONS = [
  // Back wall – 3 artworks
  [-20, 4.5, -17.6, 0,   3.2, 2.5],
  [0,   4.5, -17.6, 0,   3.2, 2.5],
  [20,  4.5, -17.6, 0,   3.2, 2.5],
  // Left wall – 2 artworks
  [-39.5, 4.0, -10, Math.PI/2, 3.0, 2.2],
  [-39.5, 4.0,  6,  Math.PI/2, 3.0, 2.2],
  // Right wall – 2 artworks
  [39.5, 4.0, -10, -Math.PI/2, 3.0, 2.2],
  [39.5, 4.0,  6,  -Math.PI/2, 3.0, 2.2],
  // Interior divider back face
  [-14.2, 4.5, -5, -Math.PI/2, 2.6, 2.0],

function makeArtworkTexture(art) {
  const size = 512;
  const cv = document.createElement('canvas');
  cv.width = size; cv.height = size;
  const ctx = cv.getContext('2d');

  const c1 = '#' + art.color1.toString(16).padStart(6, '0');
  const c2 = '#' + art.color2.toString(16).padStart(6, '0');

  if (art.type === 'gradient') {
    const grad = ctx.createLinearGradient(0, 0, size, size);
    grad.addColorStop(0, c1);
    grad.addColorStop(0.4, c2);
    grad.addColorStop(1, c1);
    ctx.fillStyle = grad; ctx.fillRect(0, 0, size, size);
    // Circles
    for (let i = 0; i < 6; i++) {
      ctx.beginPath();
      ctx.arc(Math.random()*size, Math.random()*size, 30+Math.random()*100, 0, Math.PI*2);
      ctx.fillStyle = `rgba(255,255,255,${0.03+Math.random()*0.06})`;
      ctx.fill();
    }
  } else if (art.type === 'dark_gold') {
    ctx.fillStyle = c1; ctx.fillRect(0, 0, size, size);
    // Gold leaf streaks
    for (let i = 0; i < 20; i++) {
      const x = Math.random()*size, y = Math.random()*size;
      const grad = ctx.createLinearGradient(x, y, x+200, y+80);
      grad.addColorStop(0, 'rgba(201,168,76,0)');
      grad.addColorStop(0.5, `rgba(201,168,76,${0.3+Math.random()*0.5})`);
      grad.addColorStop(1, 'rgba(201,168,76,0)');
      ctx.fillStyle = grad;
      ctx.fillRect(x, y, 200, 4);
    }
    // Abstract shape
    ctx.beginPath();
    ctx.arc(size*0.5, size*0.45, size*0.25, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(201,168,76,0.08)'; ctx.fill();
  } else if (art.type === 'ocean') {
    const grad = ctx.createLinearGradient(0, 0, 0, size);
    grad.addColorStop(0, '#001a33'); grad.addColorStop(1, '#0077b6');
    ctx.fillStyle = grad; ctx.fillRect(0, 0, size, size);
    for (let y = 0; y < size; y += 12) {
      ctx.beginPath();
      let wave = false;
      for (let x = 0; x < size; x += 4) {
        const wy = y + Math.sin((x/size)*Math.PI*6 + y*0.05)*8;
        wave ? ctx.lineTo(x, wy) : ctx.moveTo(x, wy);
        wave = true;
      }
      ctx.strokeStyle = `rgba(144,224,239,${0.04+Math.sin(y*0.05)*0.04})`; ctx.lineWidth = 1; ctx.stroke();
    }
  } else if (art.type === 'pale') {
    ctx.fillStyle = c1; ctx.fillRect(0, 0, size, size);
    // Grid lines like etchings
    ctx.strokeStyle = 'rgba(100,80,60,0.3)'; ctx.lineWidth = 0.5;
    for (let x = 0; x < size; x += 8) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,size); ctx.stroke(); }
    for (let y = 0; y < size; y += 8) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(size,y); ctx.stroke(); }
    // Organic blob
    ctx.beginPath();
    for (let a = 0; a < Math.PI*2; a += 0.1) {
      const r = 80 + Math.sin(a*5)*20 + Math.sin(a*3)*15;
      const x = size/2 + Math.cos(a)*r, y = size/2 + Math.sin(a)*r;
      a === 0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
    }
    ctx.fillStyle = 'rgba(100,80,60,0.15)'; ctx.fill();
  } else if (art.type === 'violet') {
    const grad = ctx.createRadialGradient(size/2,size/2,0,size/2,size/2,size*0.7);
    grad.addColorStop(0, '#e040fb'); grad.addColorStop(0.6, '#7b2d8b'); grad.addColorStop(1, '#0a0010');
    ctx.fillStyle = grad; ctx.fillRect(0, 0, size, size);
    for (let i = 0; i < 200; i++) {
      ctx.beginPath();
      ctx.arc(Math.random()*size, Math.random()*size, Math.random()*1.5, 0, Math.PI*2);
      ctx.fillStyle = `rgba(255,255,255,${Math.random()*0.4})`; ctx.fill();
    }
  } else if (art.type === 'rust') {
    const grad = ctx.createLinearGradient(0, 0, size, size);
    grad.addColorStop(0, '#2a0a00'); grad.addColorStop(0.5, '#8b3a00'); grad.addColorStop(1, '#4a1500');
    ctx.fillStyle = grad; ctx.fillRect(0, 0, size, size);
    // Rust texture
    for (let i = 0; i < 1000; i++) {
      const x=Math.random()*size, y=Math.random()*size;
      ctx.beginPath(); ctx.arc(x,y,Math.random()*4,0,Math.PI*2);
      ctx.fillStyle = `rgba(${160+Math.random()*60},${30+Math.random()*40},0,${Math.random()*0.4})`;
      ctx.fill();
    }
  } else if (art.type === 'mirror') {
    const grad = ctx.createLinearGradient(0, 0, size, size);
    grad.addColorStop(0, '#888'); grad.addColorStop(0.5, '#fff'); grad.addColorStop(1, '#aaa');
    ctx.fillStyle = grad; ctx.fillRect(0, 0, size, size);
    ctx.strokeStyle = 'rgba(0,0,0,0.08)'; ctx.lineWidth = 1;
    for (let i = 0; i < 30; i++) {
      ctx.beginPath(); ctx.moveTo(Math.random()*size, 0); ctx.lineTo(Math.random()*size, size); ctx.stroke();
    }
  } else if (art.type === 'biolum') {
    ctx.fillStyle = '#000820'; ctx.fillRect(0, 0, size, size);
    for (let i = 0; i < 300; i++) {
      const x=Math.random()*size, y=Math.random()*size, r=1+Math.random()*4;
      const grad = ctx.createRadialGradient(x,y,0,x,y,r*3);
      grad.addColorStop(0, 'rgba(100,255,200,0.8)');
      grad.addColorStop(1, 'rgba(100,255,200,0)');
      ctx.beginPath(); ctx.arc(x,y,r*3,0,Math.PI*2);
      ctx.fillStyle = grad; ctx.fill();
    }
  }

  // Add subtle grain overlay
  const imgData = ctx.getImageData(0, 0, size, size);
  for (let i = 0; i < imgData.data.length; i += 4) {
    const n = (Math.random() - 0.5) * 12;
    imgData.data[i]   = Math.max(0, Math.min(255, imgData.data[i]   + n));
    imgData.data[i+1] = Math.max(0, Math.min(255, imgData.data[i+1] + n));
    imgData.data[i+2] = Math.max(0, Math.min(255, imgData.data[i+2] + n));
  }
  ctx.putImageData(imgData, 0, 0);

  // Title text
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  ctx.font = `italic 22px Georgia, serif`;
  ctx.textAlign = 'left';
  ctx.fillText(art.title, 22, size - 36);
  ctx.font = `12px monospace`;
  ctx.fillStyle = 'rgba(255,255,255,0.35)';
  ctx.fillText(art.artist + ' · ' + art.year, 22, size - 16);

  const tex = new THREE.CanvasTexture(cv);
  return tex;
}

function buildArtworks() {
  ARTWORK_POSITIONS.forEach(([x, y, z, rotY, sw, sh], i) => {
    if (i >= ARTWORKS.length) return;
    const art = ARTWORKS[i];

    const group = new THREE.Group();
    group.position.set(x, y, z);
    group.rotation.y = rotY;

    // Frame
    const frameMat = new THREE.MeshStandardMaterial({ color: FRAME_COLOR, roughness: 0.6, metalness: FRAME_METAL });
    const fw2 = 0.18, fh2 = 0.18, fd = 0.12;
    // Top/bottom/left/right frame bars
    [[sw + fw2*2, fh2, fd, 0, sh/2 + fh2/2, fd/2],
     [sw + fw2*2, fh2, fd, 0, -(sh/2 + fh2/2), fd/2],
     [fw2, sh + fh2*2, fd, -(sw/2 + fw2/2), 0, fd/2],
     [fw2, sh + fh2*2, fd,  (sw/2 + fw2/2), 0, fd/2]
    ].forEach(([fw, fh, fd, fx, fy, fz]) => {
      const bar = new THREE.Mesh(new THREE.BoxGeometry(fw, fh, fd), frameMat);
      bar.position.set(fx, fy, fz); bar.castShadow = true; group.add(bar);
    });

    // Canvas
    const tex = makeArtworkTexture(art);
    const canvasMat = new THREE.MeshStandardMaterial({ map: tex, roughness: 0.85, metalness: 0 });
    const canvasMesh = new THREE.Mesh(new THREE.BoxGeometry(sw, sh, 0.05), canvasMat);
    canvasMesh.position.z = 0.03;
    canvasMesh.castShadow = true; canvasMesh.receiveShadow = true;
    group.add(canvasMesh);

    // Glow plane (very subtle)
    const glowMat = new THREE.MeshBasicMaterial({
      color: art.glow, transparent: true, opacity: 0,
      side: THREE.FrontSide
    });
    const glowMesh = new THREE.Mesh(new THREE.PlaneGeometry(sw * 1.2, sh * 1.2), glowMat);
    glowMesh.position.z = -0.05; group.add(glowMesh);
    glowMesh.userData.isGlow = true;

    // Plaque
    const plaqueMat = new THREE.MeshStandardMaterial({ color: 0x1a1510, roughness: 0.5, metalness: 0.5 });
    const plaque = new THREE.Mesh(new THREE.BoxGeometry(sw * 0.45, 0.12, 0.04), plaqueMat);
    plaque.position.set(-(sw * 0.12), -(sh/2 + 0.28), 0.03);
    group.add(plaque);

    // Number
    const numCanvas = document.createElement('canvas');
    numCanvas.width = 128; numCanvas.height = 48;
    const nc = numCanvas.getContext('2d');
    nc.fillStyle = '#1a1510'; nc.fillRect(0, 0, 128, 48);
    nc.fillStyle = '#c9a84c'; nc.font = '14px monospace';
    nc.textAlign = 'center'; nc.textBaseline = 'middle';
    nc.fillText(String(i+1).padStart(2, '0') + ' — ' + art.artist.split(' ')[1].toUpperCase(), 64, 24);
    const numTex = new THREE.CanvasTexture(numCanvas);
    const numMat = new THREE.MeshBasicMaterial({ map: numTex });
    const numMesh = new THREE.Mesh(new THREE.PlaneGeometry(sw * 0.45, 0.12), numMat);
    numMesh.position.set(-(sw * 0.12), -(sh/2 + 0.28), 0.06);
    group.add(numMesh);

    group.userData = { artIndex: i, type: 'artwork', basePos: group.position.clone() };
    canvasMesh.userData = { artIndex: i, type: 'artwork', parent: group };
    scene.add(group);
    artworkMeshes.push({ group, canvas: canvasMesh, glow: glowMesh, art, index: i });

    // Picture light
    const lx = x + Math.sin(rotY) * 1.2;
    const lz = z + Math.cos(rotY) * 1.2;
    addPictureLight(lx, y + sh/2 + 0.8, lz, x, y, z);
  });
}

function buildSculptures() {
  const positions = [
    { x: -20, z: 8 }, { x: 0, z: 5 }, { x: 20, z: 8 }
  ];
  positions.forEach(({ x, z }, i) => {
    // Pedestal
    const ped = makeBox(1.2, 1.0, 1.2, 0x181614, 0.7, 0.1);
    ped.position.set(x, 0.5, z);
    ped.castShadow = true; ped.receiveShadow = true;
    scene.add(ped);
    const pedTop = makeBox(1.4, 0.06, 1.4, 0x201e1a, 0.5, 0.3);
    pedTop.position.set(x, 1.03, z);
    scene.add(pedTop);

    // Abstract sculpture
    const sculptMat = new THREE.MeshStandardMaterial({
      color: [0xc9a84c, 0x888888, 0x2a6ea6][i],
      roughness: [0.3, 0.1, 0.6][i],
      metalness: [0.8, 0.9, 0.1][i],
    });

    let sculpt;
    if (i === 0) {
      // Twisted torus
      sculpt = new THREE.Mesh(new THREE.TorusKnotGeometry(0.38, 0.12, 120, 16, 2, 3), sculptMat);
      sculpt.position.set(x, 1.7, z);
    } else if (i === 1) {
      // Stacked spheres
      const group = new THREE.Group();
      [0.35, 0.25, 0.18].forEach((r, j) => {
        const s = new THREE.Mesh(new THREE.IcosahedronGeometry(r, 2), sculptMat.clone());
        s.position.set(0, j * 0.55 + 0.4, 0);
        if (j === 2) s.material.color.set(0xffd080);
        group.add(s);
      });
      group.position.set(x, 1.1, z);
      sculpt = group;
    } else {
      // Hollow ring
      sculpt = new THREE.Mesh(new THREE.TorusGeometry(0.38, 0.08, 16, 64), sculptMat);
      sculpt.position.set(x, 1.9, z);
      sculpt.rotation.x = Math.PI / 3;
    }
    if (sculpt.castShadow !== undefined) sculpt.castShadow = true;
    scene.add(sculpt);

    // Spotlight on sculpture
    const sl = new THREE.SpotLight(0xfff0d0, 2.5, 10, Math.PI / 12, 0.5, 2);
    sl.position.set(x, 7, z);
    sl.target.position.set(x, 1.5, z);
    sl.castShadow = false;
    scene.add(sl); scene.add(sl.target);
  });
}

/* ─────────────────────────────────────────
   ORBIT CONTROLS (manual)
───────────────────────────────────────── */
let isDragging = false, prevMouse = { x: 0, y: 0 };
let camYaw = 0, camPitch = 0.05;
let camTarget = new THREE.Vector3(0, 1.65, 0);
let camRadius = 14;
let autoTour = false, autoTourT = 0;
let activeArtwork = null;
let focusTarget = null, focusPos = null;
let isAnimating = false;

const keys = { w: false, a: false, s: false, d: false };

function updateCamera() {
  if (focusTarget && focusPos) {
    // Smooth focus
    camera.position.lerp(focusPos, 0.06);
    camTarget.lerp(focusTarget, 0.06);
    camera.lookAt(camTarget);
    return;
  }
  if (autoTour) {
    autoTourT += 0.0012;
    camYaw = autoTourT;
    camPitch = 0.12 + Math.sin(autoTourT * 0.5) * 0.08;
    camRadius = 10 + Math.sin(autoTourT * 0.3) * 3;
  }
  // WASD
  const spd = 0.04;
  const forward = new THREE.Vector3(-Math.sin(camYaw), 0, -Math.cos(camYaw));
  const right = new THREE.Vector3(Math.cos(camYaw), 0, -Math.sin(camYaw));
  if (keys.w) camTarget.addScaledVector(forward, spd * camRadius * 0.1);
  if (keys.s) camTarget.addScaledVector(forward, -spd * camRadius * 0.1);
  if (keys.a) camTarget.addScaledVector(right, -spd * camRadius * 0.1);
  if (keys.d) camTarget.addScaledVector(right, spd * camRadius * 0.1);
  camTarget.x = Math.max(-35, Math.min(35, camTarget.x));
  camTarget.z = Math.max(-16, Math.min(16, camTarget.z));

  const x = camTarget.x + Math.sin(camYaw) * Math.cos(camPitch) * camRadius;
  const y = camTarget.y + Math.sin(camPitch) * camRadius;
  const z = camTarget.z + Math.cos(camYaw) * Math.cos(camPitch) * camRadius;
  camera.position.set(x, y, z);
  camera.lookAt(camTarget);
}

/* ─────────────────────────────────────────
   INTERACTION
───────────────────────────────────────── */
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
let hoveredArtwork = null;
const tooltip = document.getElementById('tooltip');
const cursor = document.getElementById('cursor');
const cursorRing = document.getElementById('cursor-ring');

function onMouseMove(e) {
  const cx = e.clientX, cy = e.clientY;
  cursor.style.left = cx + 'px'; cursor.style.top = cy + 'px';
  cursorRing.style.left = cx + 'px'; cursorRing.style.top = cy + 'px';
  tooltip.style.left = cx + 'px'; tooltip.style.top = cy + 'px';

  mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

  if (isDragging && !focusTarget) {
    const dx = e.clientX - prevMouse.x;
    const dy = e.clientY - prevMouse.y;
    camYaw -= dx * 0.004;
    camPitch = Math.max(-0.2, Math.min(0.7, camPitch + dy * 0.003));
    prevMouse = { x: e.clientX, y: e.clientY };
  }
}

function onMouseDown(e) {
  isDragging = true;
  prevMouse = { x: e.clientX, y: e.clientY };
}

function onMouseUp(e) {
  if (!isDragging) return;
  const dx = Math.abs(e.clientX - prevMouse.x);
  const dy = Math.abs(e.clientY - prevMouse.y);
  isDragging = false;
  if (dx < 4 && dy < 4) handleClick();
}

function handleClick() {
  raycaster.setFromCamera(mouse, camera);
  const allMeshes = artworkMeshes.map(a => a.canvas);
  const hits = raycaster.intersectObjects(allMeshes);
  if (hits.length > 0) {
    const mesh = hits[0].object;
    const idx = mesh.userData.artIndex;
    focusArtwork(idx);
  } else if (focusTarget) {
    clearFocus();
  }
}

function focusArtwork(idx) {
  const { group, art } = artworkMeshes[idx];
  autoTour = false;
  document.getElementById('btn-auto').classList.remove('active');

  // Calculate focus position in front of artwork
  const dir = new THREE.Vector3(0, 0, 1);
  dir.applyQuaternion(group.quaternion);
  const target = group.position.clone();
  const pos = group.position.clone().addScaledVector(dir, 4.5);
  pos.y = 1.65;
  focusTarget = target.clone().add(new THREE.Vector3(0, 0, 0));
  focusPos = pos;

  // Update panel
  activeArtwork = idx;
  updatePanel(art, idx);
  document.getElementById('artwork-panel').classList.add('open');
  document.getElementById('minimap').querySelectorAll('.minimap-dot').forEach((d, i) => {
    d.classList.toggle('active', i === idx);
  });
  updateRoomNum(idx + 1, art.title);
  cursorRing.style.width = '60px'; cursorRing.style.height = '60px';
}

function clearFocus() {
  focusTarget = null; focusPos = null;
  document.getElementById('artwork-panel').classList.remove('open');
  activeArtwork = null;
  document.getElementById('minimap').querySelectorAll('.minimap-dot').forEach(d => d.classList.remove('active'));
  cursorRing.style.width = '40px'; cursorRing.style.height = '40px';
  updateRoomNum('—', 'THE GALLERY');
}

function updatePanel(art, idx) {
  document.getElementById('panel-num').textContent = String(idx + 1).padStart(2, '0');
  document.getElementById('panel-title').textContent = art.title;
  document.getElementById('panel-artist').textContent = art.artist;
  document.getElementById('panel-year').textContent = art.year;
  document.getElementById('panel-desc').textContent = art.desc;
  document.getElementById('panel-med-val').textContent = art.medium;
  document.getElementById('panel-dim-val').textContent = art.dimensions;
  document.getElementById('panel-tags').innerHTML = art.tags.map(t => `<span class="panel-tag">${t}</span>`).join('');
}

function updateRoomNum(num, name) {
  document.getElementById('room-num').textContent = num;
  document.getElementById('room-name').textContent = name;
}

window.closePanel = clearFocus;
window.resetView = () => {
  clearFocus();
  camYaw = 0; camPitch = 0.05; camRadius = 14;
  camTarget.set(0, 1.65, 0);
};
window.toggleAuto = () => {
  autoTour = !autoTour;
  document.getElementById('btn-auto').classList.toggle('active', autoTour);
  if (autoTour) clearFocus();
};
window.toggleHelp = () => {
  const h = document.getElementById('controls-hint');
  h.classList.toggle('hidden');
};

function onWheel(e) {
  camRadius = Math.max(3, Math.min(22, camRadius + e.deltaY * 0.01));
}

/* ─────────────────────────────────────────
   HOVER RAYCASTING
───────────────────────────────────────── */
let hoverTimeout;
function updateHover() {
  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(artworkMeshes.map(a => a.canvas));
  if (hits.length > 0) {
    const idx = hits[0].object.userData.artIndex;
    const art = ARTWORKS[idx];
    if (hoveredArtwork !== idx) {
      hoveredArtwork = idx;
      tooltip.textContent = `"${art.title}" — ${art.artist}`;
      tooltip.classList.add('visible');
      cursorRing.style.width = '60px'; cursorRing.style.height = '60px';
      // Glow the artwork
      artworkMeshes[idx].glow.material.opacity = 0.04;
    }
  } else {
    if (hoveredArtwork !== null) {
      artworkMeshes[hoveredArtwork].glow.material.opacity = 0;
      hoveredArtwork = null;
    }
    tooltip.classList.remove('visible');
    if (!activeArtwork) cursorRing.style.width = '40px'; cursorRing.style.height = '40px';
  }
}

/* ─────────────────────────────────────────
   MINIMAP
───────────────────────────────────────── */
function buildMinimap() {
  const mm = document.getElementById('minimap');
  ARTWORKS.forEach((art, i) => {
    const dot = document.createElement('div');
    dot.className = 'minimap-dot';
    dot.setAttribute('data-label', `${String(i+1).padStart(2,'0')} ${art.title}`);
    dot.addEventListener('click', () => focusArtwork(i));
    mm.appendChild(dot);
  });
}

/* ─────────────────────────────────────────
   ANIMATION LOOP
───────────────────────────────────────── */
let frame = 0;
function animate() {
  requestAnimationFrame(animate);
  frame++;

  // Particle drift
  scene.children.forEach(c => {
    if (c.userData.isParticle) {
      const pos = c.geometry.attributes.position;
      for (let i = 0; i < pos.count; i++) {
        let y = pos.getY(i) + 0.0008;
        if (y > 8.5) y = 0.5;
        pos.setY(i, y);
        pos.setX(i, pos.getX(i) + Math.sin(frame * 0.001 + i) * 0.0005);
      }
      pos.needsUpdate = true;
    }
  });

  // Sculpture rotation
  let sculptIdx = 0;
  scene.children.forEach(c => {
    if (c instanceof THREE.Mesh && c.geometry instanceof THREE.TorusKnotGeometry) {
      c.rotation.y += 0.003; c.rotation.x += 0.001;
    }
    if (c instanceof THREE.Group && c.children.length === 3 && c.children[0].geometry instanceof THREE.IcosahedronGeometry) {
      c.rotation.y += 0.004;
    }
    if (c instanceof THREE.Mesh && c.geometry instanceof THREE.TorusGeometry) {
      c.rotation.z += 0.005;
    }
  });

  // Update progress bar
  const prog = ((camYaw % (Math.PI*2)) / (Math.PI*2) + 1) % 1;
  document.getElementById('progress-line').style.width = (prog * 100) + '%';

  updateHover();
  updateCamera();
  renderer.render(scene, camera);
}

/* ─────────────────────────────────────────
   INIT
───────────────────────────────────────── */
function init() {
  buildGallery();
  buildArtworks();
  buildSculptures();
  buildDecor();
  buildMinimap();

  canvas.addEventListener('mousemove', onMouseMove);
  canvas.addEventListener('mousedown', onMouseDown);
  canvas.addEventListener('mouseup', onMouseUp);
  canvas.addEventListener('wheel', onWheel, { passive: true });

  document.addEventListener('keydown', e => { keys[e.key.toLowerCase()] = true; });
  document.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  // Loading sequence
  let progress = 0;
  const bar = document.getElementById('loading-bar');
  const interval = setInterval(() => {
    progress += Math.random() * 18;
    if (progress >= 100) {
      progress = 100;
      clearInterval(interval);
      setTimeout(() => {
        document.getElementById('loading').classList.add('done');
        animate();
      }, 400);
    }
    bar.style.width = progress + '%';
  }, 80);
}

init();
</script>
</body>
</html>
